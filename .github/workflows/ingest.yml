name: Daily Ingest

on:
  schedule:
    # 18:30 IST = 13:00 UTC, Mon–Fri (NSE closes 15:30 IST, bhavcopy available ~18:00 IST)
    - cron: "0 13 * * 1-5"
  workflow_dispatch:
    inputs:
      date:
        description: "Target date YYYY-MM-DD (blank = today)"
        required: false
        default: ""

jobs:
  ingest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: alphaveda

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate date input
        # Allowlist: empty string or ISO date (YYYY-MM-DD). Input routed through
        # env var — never interpolated directly into run: shell to prevent injection.
        if: inputs.date != ''
        env:
          INPUT_DATE: ${{ inputs.date }}
        run: |
          echo "$INPUT_DATE" | grep -Eq '^[0-9]{4}-[0-9]{2}-[0-9]{2}$' \
            || (echo "Invalid date format — must be YYYY-MM-DD" && exit 1)

      - name: Run ingest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          INGEST_DATE: ${{ inputs.date }}
        run: |
          if [ -n "$INGEST_DATE" ]; then
            python scripts/ingest.py "$INGEST_DATE"
          else
            python scripts/ingest.py
          fi

      - name: Verify ingest wrote rows
        # Fails the job if ingest status=OK but rows_written=0 (silent failure guard).
        # SKIPPED_HOLIDAY exits 0 — that is correct behaviour, not a failure.
        # Added as a step in the existing job: zero additional GHA minutes consumed.
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python - <<'EOF'
          import os, sys
          from supabase import create_client

          sb = create_client(os.environ["SUPABASE_URL"], os.environ["SUPABASE_SERVICE_KEY"])

          row = (
              sb.table("ingest_status")
              .select("status,rows_written,last_run")
              .order("last_run", desc=True)
              .limit(1)
              .execute()
              .data
          )
          if not row:
              print("ALERT: ingest_status table is empty after ingest run")
              sys.exit(1)

          status = row[0]["status"]
          rows = row[0].get("rows_written") or 0

          if status == "SKIPPED_HOLIDAY":
              print(f"OK: holiday — ingest correctly skipped ({row[0]['last_run']})")
              sys.exit(0)

          if status == "ERROR":
              print(f"ALERT: ingest status=ERROR — check error column in ingest_status")
              sys.exit(1)

          if status == "OK" and rows == 0:
              print(f"ALERT: ingest status=OK but rows_written=0 — silent failure (format change?)")
              sys.exit(1)

          print(f"OK: status={status}, rows_written={rows}, last_run={row[0]['last_run']}")
          EOF
