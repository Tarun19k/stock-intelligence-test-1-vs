name: Daily Ingest

on:
  schedule:
    # 18:30 IST = 13:00 UTC, Mon–Fri (NSE closes 15:30 IST, bhavcopy available ~18:00 IST)
    - cron: "0 13 * * 1-5"
  workflow_dispatch:
    inputs:
      date:
        description: "Target date YYYY-MM-DD (blank = today)"
        required: false
        default: ""

jobs:
  ingest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: alphaveda

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate date input
        # Allowlist: empty string or ISO date (YYYY-MM-DD). Input routed through
        # env var — never interpolated directly into run: shell to prevent injection.
        if: inputs.date != ''
        env:
          INPUT_DATE: ${{ inputs.date }}
        run: |
          echo "$INPUT_DATE" | grep -Eq '^[0-9]{4}-[0-9]{2}-[0-9]{2}$' \
            || (echo "Invalid date format — must be YYYY-MM-DD" && exit 1)

      - name: Run ingest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          INGEST_DATE: ${{ inputs.date }}
        run: |
          if [ -n "$INGEST_DATE" ]; then
            python scripts/ingest.py "$INGEST_DATE"
          else
            python scripts/ingest.py
          fi
