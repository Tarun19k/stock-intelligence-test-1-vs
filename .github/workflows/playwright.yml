name: AlphaVeda Web — SEBI Playwright Gate

on:
  push:
    paths:
      - 'alphaveda/web/**'
  pull_request:
    paths:
      - 'alphaveda/web/**'

jobs:
  sebi-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: alphaveda/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: alphaveda/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SEBI_DISCLAIMER: ${{ secrets.SEBI_DISCLAIMER }}

      - name: Start server and run SEBI + language tests
        run: |
          npm run start &
          npx wait-on http://localhost:3000 --timeout 30000
          npx playwright test tests/sebi.spec.ts tests/language.spec.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SEBI_DISCLAIMER: ${{ secrets.SEBI_DISCLAIMER }}
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: alphaveda/web/playwright-report/
